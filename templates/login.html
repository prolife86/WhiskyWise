<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhiskyWise — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --amber: #C8832A; --amber-deep: #8B4E10; --amber-light: #E8A84A; --amber-glow: #F5C670;
  --peat: #2C1F0E; --cask: #1A120A; --oak: #3D2B14; --grain: #F2E8D8;
  --grain-mid: #D9C9A8; --smoke: #6B5B45; --ash: #9C8E7C; --white: #FBF6EE;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Libre Baskerville', serif;
  background: var(--cask);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  background-image: radial-gradient(ellipse at 30% 30%, rgba(200,131,42,0.1) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 70%, rgba(139,78,16,0.08) 0%, transparent 60%);
}
.login-container {
  width: 100%; max-width: 380px;
  background: linear-gradient(160deg, rgba(61,43,20,0.9) 0%, rgba(26,18,10,0.95) 100%);
  border: 1px solid rgba(200,131,42,0.25);
  border-radius: 16px; padding: 2.5rem 2rem;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.login-logo { text-align: center; margin-bottom: 2rem; }
.login-logo .icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
.login-logo h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 800; color: var(--amber-glow); }
.login-logo p { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--ash); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.25rem; }
.form-group { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
.form-group label { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--amber-light); text-transform: uppercase; letter-spacing: 0.06em; }
.form-group input {
  background: rgba(44,31,14,0.9); border: 1px solid rgba(200,131,42,0.25);
  border-radius: 8px; color: var(--grain); padding: 0.7rem 0.9rem;
  font-family: 'Libre Baskerville', serif; font-size: 1rem;
  transition: border-color 0.2s; width: 100%;
}
.form-group input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(200,131,42,0.15); }
.btn-login {
  width: 100%; padding: 0.75rem;
  background: linear-gradient(135deg, var(--amber) 0%, var(--amber-deep) 100%);
  color: var(--white); border: none; border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 0.95rem; font-weight: 500;
  cursor: pointer; margin-top: 0.5rem;
  transition: all 0.2s;
}
.btn-login:hover { background: linear-gradient(135deg, var(--amber-light) 0%, var(--amber) 100%); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(200,131,42,0.35); }
.flash-error { background: rgba(139,38,53,0.2); border: 1px solid rgba(139,38,53,0.4); color: #E06070; padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1rem; }
.login-hint { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--smoke); text-align: center; margin-top: 1.25rem; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-logo">
    <span class="icon">🥃</span>
    <h1>WhiskyWise</h1>
    <p>Your personal whisky vault</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash-error">{{ msg }}</div>
  {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Enter the Vault</button>
  </form>
  <p class="login-hint">Default: admin / whiskywise</p>
</div>
</body>
</html>
