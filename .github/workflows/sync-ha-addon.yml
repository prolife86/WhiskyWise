name: Sync & Publish Home Assistant Add-on

on:
  push:
    branches:
      - main
    paths:
      # Trigger when app source or HA add-on files change
      - "app.py"
      - "requirements.txt"
      - "templates/**"
      - "homeassistant/**"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/whiskywise

jobs:
  # ── 1. Sync version from app.py → homeassistant/config.yaml ────────────────
  sync-version:
    name: Sync version to HA config
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.extract.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from app.py
        id: extract
        run: |
          VERSION=$(grep -oP "(?<=APP_VERSION = ')[\d.]+" app.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Update homeassistant/config.yaml version
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          sed -i "s/^version: .*/version: \"$VERSION\"/" homeassistant/config.yaml
          echo "Updated config.yaml to version $VERSION"

      - name: Commit updated config.yaml (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet homeassistant/config.yaml || (
            git add homeassistant/config.yaml
            git commit -m "chore: bump HA add-on version to ${{ steps.extract.outputs.version }} [skip ci]"
            git push
          )

  # ── 2. Build & push multi-arch Docker image to GHCR ────────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: sync-version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.sync-version.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Create a GitHub Release when version changes ─────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [sync-version, build-and-push]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if tag already exists
        id: tag_check
        run: |
          VERSION="v${{ needs.sync-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag & GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.sync-version.outputs.version }}"
          name: "WhiskyWise v${{ needs.sync-version.outputs.version }}"
          body: |
            ## WhiskyWise v${{ needs.sync-version.outputs.version }}

            ### Docker
            ```yaml
            image: ghcr.io/prolife86/whiskywise:${{ needs.sync-version.outputs.version }}
            ```

            ### Home Assistant Add-on
            Install via the WhiskyWise add-on repository.
            See [DOCS](https://github.com/prolife86/WhiskyWise/blob/main/homeassistant/DOCS.md) for setup instructions.
          draft: false
          prerelease: false
