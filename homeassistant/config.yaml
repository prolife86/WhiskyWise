name: "WhiskyWise"
description: "Your personal spirits guide — tasting journal, collection management & wishlist."
version: "1.2.0"
slug: "whiskywise"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "WhiskyWise Web UI"
options:
  secret_key: "change-this-to-a-long-random-secret"
schema:
  secret_key: str
map:
  - data:rw
image: "ghcr.io/prolife86/whiskywise:{version}"
url: "https://github.com/prolife86/WhiskyWise"
