{% extends 'base.html' %}
{% block title %}Change Password — WhiskyWise{% endblock %}
{% block content %}
<div style="max-width:380px;">
  <h1 style="color:var(--amber-glow);margin-bottom:1.5rem;">⚙️ Change Password</h1>
  <div class="card">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" name="current" required>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" name="confirm" required minlength="6">
        </div>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
        <button type="submit" class="btn btn-primary">Save Password</button>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
