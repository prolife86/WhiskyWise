{% extends 'base.html' %}
{% block title %}{% if item %}Edit Wishlist Item{% else %}Add to Wishlist{% endif %} — WhiskyWise{% endblock %}
{% block content %}
<div style="margin-bottom:1.25rem;">
  <a href="{{ url_for('wishlist') }}" style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--ash);">← Wishlist</a>
  <h1 style="color:var(--grain);margin-top:0.3rem;">{% if item %}Edit Wishlist Item{% else %}Add to Wishlist{% endif %}</h1>
</div>
<form method="POST">
<div class="card">
  <div class="form-grid form-grid-2">
    <div class="form-group" style="grid-column:1/-1;">
      <label>Whisky Name *</label>
      <input type="text" name="name" required placeholder="e.g. Ardbeg Uigeadail"
             value="{{ item.name if item else '' }}">
    </div>
    <div class="form-group">
      <label>Distillery</label>
      <input type="text" name="distillery" placeholder="e.g. Ardbeg"
             value="{{ item.distillery if item else '' }}">
    </div>
    <div class="form-group">
      <label>Region</label>
      <input type="text" name="region" placeholder="e.g. Islay"
             value="{{ item.region if item else '' }}">
    </div>
    <div class="form-group">
      <label>Expected Price (€)</label>
      <input type="number" name="price" step="0.01" min="0" placeholder="e.g. 69.95"
             value="{{ '%.2f'|format(item.price) if item and item.price is not none else '' }}">
    </div>
    <div class="form-group">
      <label>Store / Where to Buy</label>
      <input type="text" name="store" placeholder="e.g. Gall &amp; Gall"
             value="{{ item.store if item else '' }}">
    </div>
    <div class="form-group">
      <label>Barcode (optional)</label>
      <div style="display:flex;gap:0.4rem;">
        <input type="text" name="barcode" id="barcode" placeholder="Scan or enter barcode"
               value="{{ item.barcode if item else '' }}" style="flex:1;">
        <button type="button" class="btn btn-secondary btn-sm" onclick="openScanModal('barcode')">📷</button>
      </div>
    </div>
    <div class="form-group" style="grid-column:1/-1;">
      <label>Notes / Why You Want It</label>
      <textarea name="wishlist_notes" placeholder="Why is this on your list? What have you heard about it?">{{ item.wishlist_notes if item else '' }}</textarea>
    </div>
  </div>
</div>
<div style="display:flex;gap:0.75rem;margin-top:1rem;">
  <button type="submit" class="btn btn-primary">{% if item %}💾 Save Changes{% else %}💫 Add to Wishlist{% endif %}</button>
  <a href="{{ url_for('wishlist') }}" class="btn btn-ghost">Cancel</a>
</div>
</form>
{% endblock %}
