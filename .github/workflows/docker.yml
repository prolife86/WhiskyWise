name: Docker & Home Assistant Add-on

# Job order:
#   extract-version → build-and-push → release
#
# Triggers:
#   - Publishing a GitHub Release (recommended) — creates the tag and
#     triggers the full pipeline in one step via the GitHub UI.
#     Go to: Releases → Draft a new release → choose/create a tag → Publish.
#   - Push to main (code changes only, no release) — builds & pushes :latest
#     and :vdev; no GitHub Release is created.
#   - Pull requests — build check only (no push, no sign, no release).

on:
  # Primary release trigger — publish a release via the GitHub UI.
  # Creates the tag and fires the full pipeline. No terminal needed.
  release:
    types: [ published ]

  # Code-change trigger — rebuilds :latest on every push to main.
  # paths filter prevents spurious runs on docs/config-only changes.
  # Does NOT create a GitHub Release (version falls back to 'dev').
  push:
    branches: [ "main" ]
    paths:
      - "app.py"
      - "requirements.txt"
      - "templates/**"
      - "whiskywise/**"
      - "Dockerfile"

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Determine the version from the git tag or default to 'dev' ──────────
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}

    steps:
      - name: Set version from tag or fallback
        id: set
        run: |
          # Release trigger: tag is in github.event.release.tag_name (e.g. v1.3.4)
          # Tag push trigger: tag is in GITHUB_REF (refs/tags/v1.3.4)
          # Branch push / PR / manual: falls back to 'dev'
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"   # strip leading 'v'
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

  # ── 2. Sync version into HA add-on config (non-PR only) ───────────────────
  sync-version:
    name: Sync HA add-on version
    runs-on: ubuntu-latest
    needs: [ extract-version ]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Always checkout main so the version sync commit can be pushed back.
          # On a release event github.ref_name is the tag, not main.
          ref: main

      - name: Update whiskywise/config.yaml version
        run: |
          sed -i 's/^version: .*/version: "${{ needs.extract-version.outputs.version }}"/' whiskywise/config.yaml

      - name: Copy app source into whiskywise/ (HA build context)
        run: |
          cp app.py whiskywise/app.py
          cp requirements.txt whiskywise/requirements.txt
          cp -r templates whiskywise/templates

      - name: Commit if whiskywise/ changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whiskywise/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync whiskywise add-on to v${{ needs.extract-version.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi

  # ── 3. Build, push & cosign-sign the Docker image ─────────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [ extract-version, sync-version ]
    if: always() && (needs.sync-version.result == 'success' || needs.sync-version.result == 'skipped')
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=v${{ needs.extract-version.outputs.version }},enable=${{ github.event_name != 'pull_request' && needs.extract-version.outputs.version != 'dev' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject the version so app.py can read it via os.environ['APP_VERSION']
          build-args: |
            APP_VERSION=${{ needs.extract-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  # ── 4. Update GitHub Release with Docker image details ────────────────────
  release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    needs: [ extract-version, build-and-push ]
    # Only runs on an actual release or tag push — not on branch pushes or PRs
    if: github.event_name != 'pull_request' && needs.extract-version.outputs.version != 'dev'
    permissions:
      contents: write

    steps:
      - name: Append Docker image info to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.extract-version.outputs.version }}"
          # append_body adds the Docker details below whatever you wrote in the
          # GitHub UI — your hand-written release notes are preserved.
          append_body: true
          body: |

            ---
            ### Docker image
            ```
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ needs.extract-version.outputs.version }}
            ```

            ### Home Assistant Add-on
            Add this repository in HA: **Settings → Add-ons → ⋮ → Repositories**
            ```
            https://github.com/prolife86/WhiskyWise
            ```
