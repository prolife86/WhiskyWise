name: Docker & Home Assistant Add-on

# Replaces:
#   - docker-image.yml   (basic build check)
#   - docker-publish.yml (build, push, cosign sign)
#
# Job order:
#   sync-version → build-and-push → release
#
# On PRs: build check only (no push, no sign, no release).
# On push to main: full pipeline.

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
    paths:
      - "app.py"
      - "requirements.txt"
      - "templates/**"
      - "whiskywise/**"
      - "Dockerfile"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Sync APP_VERSION → whiskywise/config.yaml ───────────────────────────
  sync-version:
    name: Sync HA add-on version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    outputs:
      version: ${{ steps.extract.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract APP_VERSION from app.py
        id: extract
        run: |
          VERSION=$(grep -oP "(?<=APP_VERSION = ')[\d.]+" app.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Update whiskywise/config.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.extract.outputs.version }}\"/" whiskywise/config.yaml

      - name: Copy app source into whiskywise/ (HA build context)
        run: |
          cp app.py whiskywise/app.py
          cp requirements.txt whiskywise/requirements.txt
          cp -r templates whiskywise/templates

      - name: Commit if whiskywise/ changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whiskywise/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync whiskywise add-on to v${{ steps.extract.outputs.version }} [skip ci]"
            git push
          fi

  # ── 2. Build, push & cosign-sign the Docker image ──────────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [ sync-version ]
    if: always() && (needs.sync-version.result == 'success' || needs.sync-version.result == 'skipped')
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: "v2.2.4"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          TAGS:   ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  # ── 3. Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ sync-version, build-and-push ]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if release tag already exists
        id: tag_check
        run: |
          VERSION="v${{ needs.sync-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION$"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.sync-version.outputs.version }}"
          name:     "WhiskyWise v${{ needs.sync-version.outputs.version }}"
          body: |
            ## WhiskyWise v${{ needs.sync-version.outputs.version }}

            ### Docker image
            ```
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ needs.sync-version.outputs.version }}
            ```

            ### Home Assistant Add-on
            Add this repository in HA: **Settings → Add-ons → Add-on Store → ⋮ → Repositories**
            ```
            https://github.com/prolife86/WhiskyWise
            ```
          draft: false
          prerelease: false
