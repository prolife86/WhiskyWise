version: '3.8'

services:
  whiskywise:
    build: .
    container_name: whiskywise
    ports:
      - "5000:5000"
    volumes:
      - whiskywise_data:/data
    environment:
      - SECRET_KEY=change-this-to-a-long-random-secret
      - DATABASE_PATH=/data/db/whiskywise.db
      - UPLOAD_FOLDER=/data/uploads
    restart: unless-stopped

volumes:
  whiskywise_data:
    driver: local
